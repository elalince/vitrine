<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1,user-scalable=0">
    <title>Cap Solutions</title>

    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Medula+One&family=Menbere:wght@100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

</head>
<body>
    <header>
    <div class="header">
        <div class="header__left">
            <div class="logo" id="logoBtn" role="button" tabindex="0" aria-label="Cap Solutions — À propos" title="À propos / About">
            <img src="img/logo.webp">
            </div>
            <div class="logo-text" data-i18n="header.logo-text">
                Cap Solutions
            </div>
        </div>

            <button class="resume__btn" id="teamBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3.2"></circle><path d="M2.5 20.5v-1a5 5 0 0 1 5-5h3a5 5 0 0 1 5 5v1"></path><circle cx="17.6" cy="8" r="2.4"></circle><path d="M21.5 20.5v-1a4 4 0 0 0-3-3.87"></path></svg><span id="teamBtnLabel" data-i18n="header.btn">Notre équipe</span></button>
        <div class="lang">
            <a data-lang="fr">FR</a>
            <a data-lang="en">EN</a>
        </div>
    </div>
</header>
        <div class="container">
            <div class="carousel">
                <div class="carousel__item carousel__item--1 carousel__item--main carousel__item--center" data-modal-num="01" data-modal-title-fr="Cloud simplifié" data-modal-title-en="Simplified cloud" data-modal-body-fr="<p>Cap Solutions met en place une infrastructure cloud robuste et simple à exploiter.</p><p>Le service couvre la sécurité, l'automatisation et l'accès à distance aux données.</p>" data-modal-body-en="<p>Cap Solutions builds a robust cloud infrastructure that is simple to operate.</p><p>The service covers security, automation, and remote access to data.</p>">
                        <div class="carousel__item-text" data-i18n="hero.text"></div>
                            <img src="img/image-1.webp">
                            <img src="img/image-2.webp">
                </div>
                <div class="carousel__item carousel__item--2 carousel__item--right-left" data-modal-num="02" data-modal-title-fr="Stockage intelligent" data-modal-title-en="Smart storage" data-modal-body-fr="<p>Le stockage est organisé pour offrir rapidité, fiabilité et évolutivité.</p><p>Les données restent accessibles partout, sans complexité technique.</p>" data-modal-body-en="<p>Storage is organized to provide speed, reliability, and scalability.</p><p>Data remains accessible everywhere without technical complexity.</p>">
                        <img src="img/item-2-image-1-fr.webp" class="carousel__item-image carousel__item-image--fr">
                        <img src="img/item-2-image-1-en.webp" class="carousel__item-image carousel__item-image--en" style="display: none;">
                        <img src="img/item-2-image-2-fr.webp">
                </div>
                <div class="carousel__item carousel__item--3 carousel__item--right-right" data-modal-num="03" data-modal-title-fr="Sécurité renforcée" data-modal-title-en="Enhanced security" data-modal-body-fr="<p>Les environnements sont protégés par des mécanismes de sécurité adaptés à chaque usage.</p><p>L'objectif est de garantir la continuité et la confiance.</p>" data-modal-body-en="<p>Environments are protected with security mechanisms tailored to each use case.</p><p>The goal is to guarantee continuity and trust.</p>">
                        <img src="img/item-3-image-1-fr.webp" class="carousel__item-image carousel__item-image--fr">
                        <img src="img/item-3-image-1-en.webp" class="carousel__item-image carousel__item-image--en" style="display: none;">
                         <img src="img/item-3-image-2-fr.webp">
                </div>
                <div class="carousel__item carousel__item--4 carousel__item--left-right" data-modal-num="04" data-modal-title-fr="Automatisation" data-modal-title-en="Automation" data-modal-body-fr="<p>L'automatisation réduit les tâches manuelles et accélère les opérations.</p><p>Elle permet de gagner du temps tout en limitant les erreurs.</p>" data-modal-body-en="<p>Automation reduces manual tasks and speeds up operations.</p><p>It saves time while limiting errors.</p>">

                        <img src="img/item-4-image-1-fr.webp" class="carousel__item-image carousel__item-image--fr">
                        <img src="img/item-4-image-1-en.webp" class="carousel__item-image carousel__item-image--en" style="display: none;">
                         <img src="img/item-4-image-2-fr.webp">
                </div>
                <div class="carousel__item carousel__item--5 carousel__item--left-left" data-modal-num="05" data-modal-title-fr="Expérience utilisateur" data-modal-title-en="User experience" data-modal-body-fr="<p>Chaque solution a été pensée pour être fluide, claire et efficace.</p><p>Le résultat est une expérience simple pour les équipes comme pour les clients.</p>" data-modal-body-en="<p>Each solution is designed to be smooth, clear, and efficient.</p><p>The result is a simple experience for teams and customers alike.</p>">
                        <img src="img/item-5-image-1-fr.webp" class="carousel__item-image carousel__item-image--fr">
                        <img src="img/item-5-image-1-en.webp" class="carousel__item-image carousel__item-image--en" style="display: none;">
                         <img src="img/item-5-image-2-fr.webp">
                </div>
            </div>
        </div>
    <div class="wave wave--1"></div>
    <div class="wave wave--2"></div>
     <div class="modal" id="modal" hidden>
  <div class="modal-back" id="modalBack"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-head">
      <button class="sheet-back" id="sheetBack" aria-label="Retour">←</button>
      <span class="sheet-num" id="sheetNum"></span>
      <h2 class="sheet-title" id="sheetTitle"></h2>
      <button class="sheet-close" id="sheetClose" aria-label="Fermer">&times;</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

     <footer>
    <script src="js/app.min.js"></script>
    <script src="js/modal.js"></script>
</footer>
</body>
</html>
