<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1,user-scalable=0">
    <title>Cap Solutions</title>

    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Medula+One&family=Menbere:wght@100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

</head>
<body>
    <header>
    <div class="header">
        <div class="header__left">
            <div class="logo" id="logoBtn" role="button" tabindex="0" aria-label="Cap Solutions — À propos" title="À propos / About">
            <img src="img/logo.webp">
            </div>
            <div class="logo-text" data-i18n="header.logo-text">
                Cap Solutions
            </div>
        </div>

            <button class="resume__btn" id="teamBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3.2"></circle><path d="M2.5 20.5v-1a5 5 0 0 1 5-5h3a5 5 0 0 1 5 5v1"></path><circle cx="17.6" cy="8" r="2.4"></circle><path d="M21.5 20.5v-1a4 4 0 0 0-3-3.87"></path></svg><span id="teamBtnLabel" data-i18n="header.btn">Notre équipe</span></button>
        <div class="lang">
            <a data-lang="fr">FR</a>
            <a data-lang="en">EN</a>
        </div>
    </div>
</header>
        <div class="container">
            <div class="carousel">
                <div class="carousel__item carousel__item--1 carousel__item--main carousel__item--center">
                        <div class="carousel__item-text" data-i18n="hero.text"></div>
                            <img src="img/image-1.webp">
                            <img src="img/image-2.webp">
                </div>
                <div class="carousel__item carousel__item--2 carousel__item--right-left">
                        <img src="img/item-2-image-1-fr.webp" class="carousel__item-image carousel__item-image--fr">
                        <img src="img/item-2-image-1-en.webp" class="carousel__item-image carousel__item-image--en" style="display: none;">
                        <img src="img/item-2-image-2-fr.webp">
                </div>
                <div class="carousel__item carousel__item--3 carousel__item--right-right">
                        <img src="img/item-3-image-1-fr.webp" class="carousel__item-image carousel__item-image--fr">
                        <img src="img/item-3-image-1-en.webp" class="carousel__item-image carousel__item-image--en" style="display: none;">
                         <img src="img/item-3-image-2-fr.webp">
                </div>
                <div class="carousel__item carousel__item--4 carousel__item--left-right">

                        <img src="img/item-4-image-1-fr.webp" class="carousel__item-image carousel__item-image--fr">
                        <img src="img/item-4-image-1-en.webp" class="carousel__item-image carousel__item-image--en" style="display: none;">
                         <img src="img/item-4-image-2-fr.webp">
                </div>
                <div class="carousel__item carousel__item--5 carousel__item--left-left">
                        <img src="img/item-5-image-1-fr.webp" class="carousel__item-image carousel__item-image--fr">
                        <img src="img/item-5-image-1-en.webp" class="carousel__item-image carousel__item-image--en" style="display: none;">
                         <img src="img/item-5-image-2-fr.webp">
                </div>
            </div>
        </div>
    <div class="wave wave--1"></div>
    <div class="wave wave--2"></div>
     <div class="modal" id="modal" hidden>
  <div class="modal-back" id="modalBack"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-head">
      <button class="sheet-back" id="sheetBack" aria-label="Retour">←</button>
      <span class="sheet-num" id="sheetNum"></span>
      <h2 class="sheet-title" id="sheetTitle"></h2>
      <button class="sheet-close" id="sheetClose" aria-label="Fermer">&times;</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

     <footer>
    <script src="js/app.min.js"></script>
</footer>
</body>
</html>
